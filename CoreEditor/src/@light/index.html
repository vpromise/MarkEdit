<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkEdit</title>
</head>
<body>
  <main id="editor">
    <article id="preview"></article>
  </main>
  <script type=module src="./index.ts"></script>
  <style>
    :root {
      color-scheme: light;
      --background-color: #ffffff;
      --text-color: #24292f;
      --muted-color: #57606a;
      --border-color: #d0d7de;
      --soft-border-color: #d8dee4;
      --accent-color: #0969da;
      --code-background-color: #f6f8fa;
      --blockquote-border-color: #d0d7de;
      --table-header-color: #f6f8fa;
      --font-size: 15px;
      --line-height: 1.55;
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --background-color: #0d1116;
      --text-color: #e6edf3;
      --muted-color: #848d97;
      --border-color: #30363d;
      --soft-border-color: #21262d;
      --accent-color: #2f81f7;
      --code-background-color: #161b22;
      --blockquote-border-color: #3b434b;
      --table-header-color: #161b22;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        color-scheme: dark;
        --background-color: #0d1116;
        --text-color: #e6edf3;
        --muted-color: #848d97;
        --border-color: #30363d;
        --soft-border-color: #21262d;
        --accent-color: #2f81f7;
        --code-background-color: #161b22;
        --blockquote-border-color: #3b434b;
        --table-header-color: #161b22;
      }
    }

    html, body {
      min-height: 100%;
      margin: 0;
      overflow: auto;
      background-color: var(--background-color);
      color: var(--text-color);
    }

    body {
      position: relative;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      font-size: var(--font-size);
      line-height: var(--line-height);
      -webkit-font-smoothing: antialiased;
    }

    #editor {
      box-sizing: border-box;
      width: min(100%, 920px);
      margin: 0 auto;
      padding: calc(var(--editor-inset-top, 0px) + 28px) 32px 36px;
    }

    #preview {
      transform-origin: top left;
    }

    #preview > :first-child {
      margin-top: 0;
    }

    #preview > :last-child {
      margin-bottom: 0;
    }

    h1, h2, h3, h4, h5, h6 {
      margin: 1.4em 0 0.65em;
      line-height: 1.25;
      font-weight: 650;
    }

    h1, h2 {
      padding-bottom: 0.28em;
      border-bottom: 1px solid var(--soft-border-color);
    }

    h1 {
      font-size: 2em;
    }

    h2 {
      font-size: 1.55em;
    }

    h3 {
      font-size: 1.25em;
    }

    h4 {
      font-size: 1.08em;
    }

    h5, h6 {
      font-size: 1em;
      color: var(--muted-color);
    }

    p, blockquote, ul, ol, pre, table {
      margin: 0 0 1em;
    }

    a {
      color: var(--accent-color);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    ul, ol {
      padding-left: 1.5em;
    }

    li + li {
      margin-top: 0.25em;
    }

    blockquote {
      padding: 0 1em;
      color: var(--muted-color);
      border-left: 0.25em solid var(--blockquote-border-color);
    }

    code, pre {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, monospace;
      font-size: 0.88em;
    }

    code {
      padding: 0.16em 0.36em;
      border-radius: 6px;
      background-color: var(--code-background-color);
    }

    pre {
      overflow: auto;
      padding: 1em;
      border-radius: 8px;
      background-color: var(--code-background-color);
    }

    pre code {
      display: block;
      padding: 0;
      background-color: transparent;
      white-space: pre;
    }

    table {
      display: block;
      width: max-content;
      max-width: 100%;
      overflow: auto;
      border-collapse: collapse;
      border-spacing: 0;
    }

    th, td {
      padding: 0.45em 0.75em;
      border: 1px solid var(--border-color);
    }

    th {
      font-weight: 600;
      background-color: var(--table-header-color);
    }

    hr {
      height: 0.25em;
      margin: 1.5em 0;
      border: 0;
      background-color: var(--soft-border-color);
    }

    img {
      max-width: 100%;
      height: auto;
    }

    .katex-display {
      margin: 1em 0;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 0.1em;
    }

    .katex {
      color: inherit;
    }
  </style>
</body>
</html>
